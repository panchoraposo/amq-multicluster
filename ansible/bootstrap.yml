- name: Bootstrap OpenShift GitOps + Argo Applications
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    project_root: "{{ playbook_dir | dirname }}"
  tasks:
    - name: Install OpenShift GitOps operator (all contexts)
      ansible.builtin.command: >
        oc --context {{ item }} apply -f {{ project_root }}/ansible/files/openshift-gitops-operator.yaml
      loop: "{{ oc_contexts }}"
      changed_when: true

    - name: Wait for GitOps Subscription to resolve currentCSV (all contexts)
      ansible.builtin.command: >
        oc --context {{ item }} -n openshift-gitops-operator
        get subscription openshift-gitops-operator -o jsonpath='{.status.currentCSV}'
      register: gitops_csv
      retries: 120
      delay: 5
      until: gitops_csv.stdout is defined and (gitops_csv.stdout | length) > 0
      loop: "{{ oc_contexts }}"
      changed_when: false

    - name: Wait for GitOps operator CSV to be Succeeded (all contexts)
      ansible.builtin.command: >
        oc --context {{ item.item }} -n openshift-gitops-operator
        wait --for=jsonpath='{.status.phase}'=Succeeded
        csv {{ item.stdout }}
        --timeout=600s
      loop: "{{ gitops_csv.results }}"
      changed_when: false

    - name: Wait for openshift-gitops namespace to exist (all contexts)
      ansible.builtin.command: >
        oc --context {{ item }} get ns openshift-gitops
      register: ns_check
      retries: 60
      delay: 5
      until: ns_check.rc == 0
      changed_when: false
      loop: "{{ oc_contexts }}"

    - name: Wait for openshift-gitops-server deployment to be Available (all contexts)
      ansible.builtin.command: >
        oc --context {{ item }} -n openshift-gitops
        wait --for=condition=Available
        deploy -l app.kubernetes.io/name=openshift-gitops-server
        --timeout=600s
      loop: "{{ oc_contexts }}"
      changed_when: false

    - name: Grant cluster-admin to Argo CD application controller (all contexts)
      ansible.builtin.command: >
        oc --context {{ item }} apply -f -
      args:
        stdin: |
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: openshift-gitops-argocd-application-controller-cluster-admin
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: openshift-gitops-argocd-application-controller
              namespace: openshift-gitops
      loop: "{{ oc_contexts }}"
      changed_when: true

    - name: Apply bootstrap Argo CD Application for each context
      ansible.builtin.command: >
        oc --context {{ item }} apply -f {{ project_root }}/gitops/bootstrap/{{ item }}.yaml
      loop: "{{ oc_contexts }}"
      changed_when: true

    - name: Set RHSI link bootstrap contexts
      ansible.builtin.set_fact:
        grant_context: "{{ oc_contexts[0] }}"
        other_contexts: "{{ oc_contexts[1:] }}"
        mesh_links:
          # Link everyone to the first site (default)
          - grant: "{{ oc_contexts[0] }}"
            others: "{{ oc_contexts[1:] }}"
          # Add a direct link between amq2 and amq3 so Network Observer shows the edge
          - grant: "{{ oc_contexts[1] }}"
            others: "{{ oc_contexts[2:] }}"

    - name: Wait for Skupper Site CR to be Ready (all contexts)
      ansible.builtin.command: >
        oc --context {{ item }} -n amq-multicluster-skupper
        get site {{ item }} -o jsonpath='{.status.status}'
      register: skupper_site_status
      retries: 120
      delay: 5
      until: skupper_site_status.stdout is defined and skupper_site_status.stdout == "Ready"
      loop: "{{ oc_contexts }}"
      changed_when: false

    - name: Create site links (AccessGrant -> AccessToken) for mesh_links
      vars:
        link_grant: "{{ item.grant }}"
        link_others: "{{ item.others }}"
      block:
        - name: Wait for AccessGrant on link_grant to be Ready
          ansible.builtin.command: >
            oc --context {{ link_grant }} -n amq-multicluster-skupper
            get accessgrant grant-{{ link_grant }} -o jsonpath='{.status.status}'
          register: grant_ready_loop
          retries: 120
          delay: 5
          until: grant_ready_loop.stdout is defined and grant_ready_loop.stdout == "Ready"
          changed_when: false

        - name: Read AccessGrant token fields (url/code/ca)
          ansible.builtin.command: >
            oc --context {{ link_grant }} -n amq-multicluster-skupper
            get accessgrant grant-{{ link_grant }} -o jsonpath='{.status.{{ item }}}'
          loop:
            - url
            - code
            - ca
          register: grant_fields_loop
          changed_when: false

        - name: Apply AccessToken to link_others to link_grant
          ansible.builtin.command: >
            oc --context {{ item }} -n amq-multicluster-skupper apply -f -
          args:
            stdin: |
              apiVersion: skupper.io/v2alpha1
              kind: AccessToken
              metadata:
                name: token-to-{{ link_grant }}
              spec:
                url: "{{ (grant_fields_loop.results | selectattr('item','equalto','url') | first).stdout }}"
                code: "{{ (grant_fields_loop.results | selectattr('item','equalto','code') | first).stdout }}"
                ca: |-
              {{ ((grant_fields_loop.results | selectattr('item','equalto','ca') | first).stdout | indent(4, true)) }}
          loop: "{{ link_others }}"
          changed_when: true
      loop: "{{ mesh_links }}"

