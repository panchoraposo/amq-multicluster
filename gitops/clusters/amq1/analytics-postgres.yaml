apiVersion: v1
kind: Secret
metadata:
  name: analytics-postgres
  namespace: amq-multicluster-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "10"
type: Opaque
stringData:
  database: sensordb
  username: sensor
  password: sensor
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: analytics-postgres
  namespace: amq-multicluster-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-postgres
  namespace: amq-multicluster-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "11"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-postgres
  template:
    metadata:
      labels:
        app: analytics-postgres
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-16:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom: {secretKeyRef: {name: analytics-postgres, key: database}}
            - name: POSTGRESQL_USER
              valueFrom: {secretKeyRef: {name: analytics-postgres, key: username}}
            - name: POSTGRESQL_PASSWORD
              valueFrom: {secretKeyRef: {name: analytics-postgres, key: password}}
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: analytics-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-postgres
  namespace: amq-multicluster-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "12"
spec:
  selector:
    app: analytics-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432

