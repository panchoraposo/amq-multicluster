apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Namespaces
  - namespace-amq.yaml
  - namespace-skupper.yaml
  - namespace-apps.yaml
  - namespace-edge.yaml

  # Operators
  - amq-broker-operatorgroup.yaml
  - amq-broker-subscription.yaml
  - rhsi-subscription.yaml
  - rhsi-netobs-subscription.yaml

  # AMQ runtime
  - amq-tls-mqtt-secret.yaml
  - addresses-queues.yaml
  - broker.yaml
  - mqtts-lb-service.yaml

  # Service Interconnect (RHSI/Skupper v2)
  - site.yaml
  - network-observer.yaml
  - amq-connectors.yaml
  - amq-listeners.yaml
  - mqtt-listeners.yaml
  - access-grant.yaml

  # Apps (build + run)
  - imagestreams.yaml
  - buildconfigs.yaml
  - apps.yaml

  # Edge ingress (on-prem HAProxy → AMQ1/AMQ2)
  - edge-build.yaml
  - edge-haproxy.yaml

  # OpenShift console customization (banner + app menu links)
  - console-banner.yaml
  - console-links.yaml

