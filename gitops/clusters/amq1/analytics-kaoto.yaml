apiVersion: apps/v1
kind: Deployment
metadata:
  name: kaoto
  namespace: amq-multicluster-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kaoto
  template:
    metadata:
      labels:
        app: kaoto
    spec:
      containers:
        - name: kaoto
          image: quay.io/kaotoio/kaoto-app:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kaoto
  namespace: amq-multicluster-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  selector:
    app: kaoto
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: kaoto
  namespace: amq-multicluster-analytics
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  to:
    kind: Service
    name: kaoto
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

