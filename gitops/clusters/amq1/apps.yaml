apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer
  namespace: amq-multicluster-apps
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-consumer
  template:
    metadata:
      labels:
        app: event-consumer
    spec:
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/amq-multicluster-apps/event-consumer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DEMO_MQTT_HOST
              value: amq-amq1-mqtts-lb.amq-multicluster-amq.svc
            - name: DEMO_MQTT_PORT
              value: "8883"
            - name: DEMO_MQTT_TOPIC
              value: iot/events/v4
            - name: DEMO_MQTT_INSECURE_TLS
              value: "true"
            - name: DEMO_MQTT_SITE
              value: amq1
            - name: DEMO_BROKER_URL
              value: (tcp://amq-amq1-ss-0.amq-amq1-hdls-svc.amq-multicluster-amq.svc:61616,tcp://amq-amq1-ss-1.amq-amq1-hdls-svc.amq-multicluster-amq.svc:61616)?ha=true&reconnectAttempts=-1&retryInterval=1000&retryIntervalMultiplier=1.0
            - name: DEMO_BROKER_QUEUE
              value: iot/events/v4
            - name: DEMO_BROKER_SITE
              value: amq1
---
apiVersion: v1
kind: Service
metadata:
  name: event-consumer
  namespace: amq-multicluster-apps
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  selector:
    app: event-consumer
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: event-consumer
  namespace: amq-multicluster-apps
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  to:
    kind: Service
    name: event-consumer
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-simulator
  namespace: amq-multicluster-apps
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: device-simulator
  template:
    metadata:
      labels:
        app: device-simulator
    spec:
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/amq-multicluster-apps/device-simulator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 1880
          env:
            - name: MQTT_SITE
              value: onprem
            - name: MQTT_HOST
              value: onprem-mqtt-haproxy.amq-multicluster-edge.svc
            - name: MQTT_PORT
              value: "8883"
            - name: MQTT_USERNAME
              value: admin
            - name: MQTT_PASSWORD
              value: admin
            - name: MQTT_TOPIC
              value: multicast/iot/events/v4
            - name: DEVICE_COUNT
              value: "25"
            - name: MQTT_INTERVAL_MS
              value: "1000"
---
apiVersion: v1
kind: Service
metadata:
  name: device-simulator
  namespace: amq-multicluster-apps
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  selector:
    app: device-simulator
  ports:
    - name: http
      port: 1880
      targetPort: 1880
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: device-simulator
  namespace: amq-multicluster-apps
  annotations:
    argocd.argoproj.io/sync-wave: "42"
spec:
  to:
    kind: Service
    name: device-simulator
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
