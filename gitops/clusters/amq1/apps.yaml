apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer
  namespace: amq-multicluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-consumer
  template:
    metadata:
      labels:
        app: event-consumer
    spec:
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/amq-multicluster/event-consumer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DEMO_BROKER_URL
              value: amq-amq1-hdls-svc:61616
            - name: DEMO_BROKER_QUEUE
              value: iot.events
            - name: DEMO_BROKER_SITE
              value: amq1
---
apiVersion: v1
kind: Service
metadata:
  name: event-consumer
  namespace: amq-multicluster
spec:
  selector:
    app: event-consumer
  ports:
    - name: http
      port: 8081
      targetPort: 8081
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: event-consumer
  namespace: amq-multicluster
spec:
  to:
    kind: Service
    name: event-consumer
  port:
    targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: device-simulator
  namespace: amq-multicluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: device-simulator
  template:
    metadata:
      labels:
        app: device-simulator
    spec:
      volumes:
        - name: mqtt-tls
          secret:
            secretName: amq-tls-mqtt
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/amq-multicluster/device-simulator:latest
          imagePullPolicy: Always
          volumeMounts:
            - name: mqtt-tls
              mountPath: /etc/mqtt
              readOnly: true
          env:
            - name: DEMO_MQTT_SITE
              value: amq1
            - name: DEMO_MQTT_HOST
              value: amq-amq1-mqtts-0-svc
            - name: DEMO_MQTT_PORT
              value: "8883"
            - name: DEMO_MQTT_TLS
              value: "true"
            - name: DEMO_MQTT_USERNAME
              value: admin
            - name: DEMO_MQTT_PASSWORD
              value: admin
            - name: DEMO_MQTT_TRUST_STORE_PATH
              value: /etc/mqtt/client.ts
            - name: DEMO_MQTT_TRUST_STORE_PASSWORD
              value: amqdemo
            - name: DEMO_MQTT_KEY_STORE_PATH
              value: /etc/mqtt/broker.ks
            - name: DEMO_MQTT_KEY_STORE_PASSWORD
              value: amqdemo
            - name: DEMO_MQTT_TRUST_ALL
              value: "true"
            - name: DEMO_MQTT_DEVICE_COUNT
              value: "25"
            - name: DEMO_MQTT_INTERVAL_MS
              value: "200"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visualizer
  namespace: amq-multicluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: visualizer
  template:
    metadata:
      labels:
        app: visualizer
    spec:
      containers:
        - name: app
          image: image-registry.openshift-image-registry.svc:5000/amq-multicluster/visualizer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DEMO_UI_AMQ1_LABEL
              value: AMQ1
            - name: DEMO_UI_AMQ1_COLOR
              value: "#2563eb"
            - name: DEMO_UI_AMQ2_LABEL
              value: AMQ2
            - name: DEMO_UI_AMQ2_COLOR
              value: "#16a34a"
            - name: DEMO_UI_AMQ3_LABEL
              value: AMQ3
            - name: DEMO_UI_AMQ3_COLOR
              value: "#a21caf"
            - name: DEMO_CONSUMERS_AMQ1_SNAPSHOT_URL
              value: http://event-consumer:8081/api/snapshot
            - name: DEMO_CONSUMERS_AMQ2_SNAPSHOT_URL
              value: http://event-consumer-amq-multicluster.apps.cluster-2jph4.2jph4.sandbox5374.opentlc.com/api/snapshot
            - name: DEMO_CONSUMERS_AMQ3_SNAPSHOT_URL
              value: http://event-consumer-amq-multicluster.apps.cluster-jtflv.jtflv.sandbox3540.opentlc.com/api/snapshot
            - name: DEMO_JOLOKIA_AMQ1_BASE_URL
              value: http://amq-amq1-wconsj-0-svc:8161/console/jolokia
            - name: DEMO_JOLOKIA_AMQ2_BASE_URL
              value: http://amq-amq2-wconsj-0-svc-rte-amq-multicluster.apps.cluster-2jph4.2jph4.sandbox5374.opentlc.com/console/jolokia
            - name: DEMO_JOLOKIA_AMQ3_BASE_URL
              value: http://amq-amq3-wconsj-0-svc-rte-amq-multicluster.apps.cluster-jtflv.jtflv.sandbox3540.opentlc.com/console/jolokia
            - name: DEMO_JOLOKIA_USERNAME
              value: admin
            - name: DEMO_JOLOKIA_PASSWORD
              value: admin
---
apiVersion: v1
kind: Service
metadata:
  name: visualizer
  namespace: amq-multicluster
spec:
  selector:
    app: visualizer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: visualizer
  namespace: amq-multicluster
spec:
  to:
    kind: Service
    name: visualizer
  port:
    targetPort: http

