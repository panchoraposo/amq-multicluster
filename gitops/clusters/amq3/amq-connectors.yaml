apiVersion: skupper.io/v2alpha1
kind: AttachedConnector
metadata:
  name: amq-amq3-mirror
  namespace: amq-multicluster-amq
  annotations:
    argocd.argoproj.io/sync-wave: "22"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  siteNamespace: amq-multicluster-skupper
  selector: ActiveMQArtemis=amq-amq3
  port: 5672

---
apiVersion: skupper.io/v2alpha1
kind: AttachedConnectorBinding
metadata:
  name: amq-amq3-mirror
  namespace: amq-multicluster-skupper
  annotations:
    argocd.argoproj.io/sync-wave: "22"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  connectorNamespace: amq-multicluster-amq
  routingKey: amq-amq3-mirror

