apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amq-multicluster-amq3
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/panchoraposo/amq-multicluster.git
    targetRevision: main
    path: gitops/clusters/amq3
  destination:
    server: https://kubernetes.default.svc
    namespace: amq-multicluster-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true

